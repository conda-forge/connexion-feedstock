{% set name = "connexion" %}
{% set version = "2.15.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/connexion-{{ version }}.tar.gz
  sha256: ff489f9dcd384aa53c53149e88d0a777f07660b98cf6488003cdcd270928c93b

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - connexion = connexion.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - poetry-core >=1.2.0

  run:
    - python >={{ python_min }},<4.0
    - aiohttp >=3.10.10,<4.0
    - aiohttp-jinja2 >=1.6
    - clickclick >=20.10.2
    - flask >=2.3.3
    - inflection >=0.3.1
    - jinja2 >=3.1.2
    - jsonschema >=4.17.3
    - markupsafe >=3.0.2
    - packaging >=25
    - python-multipart >=0.0.15
    - pyyaml >=5.1
    - requests >=2.27
    - werkzeug >=3.1.3

test:
  imports:
    - connexion
  commands:
    - connexion --version
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/zalando/connexion
  license: Apache-2.0
  summary: Swagger/OpenAPI First framework for Python on top of Flask with automatic endpoint validation & OAuth2 support
  license_family: APACHE
  license_file: LICENSE.txt
  dev_url: https://github.com/zalando/connexion
  doc_url: https://connexion.readthedocs.io/

extra:
  recipe-maintainers:
    - rvalieris
    - xylar
